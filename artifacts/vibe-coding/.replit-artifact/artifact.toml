kind = "web"
previewPath = "/"
title = "Vibe Coding"
version = "1.0.0"
id = "artifacts/vibe-coding"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18572

[services.development]
run = "pnpm --filter @workspace/vibe-coding run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vibe-coding", "run", "build" ]
publicDir = "artifacts/vibe-coding/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18572"
BASE_PATH = "/"
